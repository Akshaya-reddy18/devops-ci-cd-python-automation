name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run Tests
        env:
          FLASK_ENV: testing
        run: |
          python -m pytest app/tests/ -v

  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-python-api:latest,${{ secrets.DOCKERHUB_USERNAME }}/devops-python-api:${{ github.sha }}

  deploy:
    name: Deploy to Production
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4

      - name: Execute Deployment
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "Setting up SSH key for deployment..."
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_SERVER" >> ~/.ssh/known_hosts
          
          echo "Deploying the new container..."
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_SERVER "
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-python-api:latest &&
            docker stop devops-api || true &&
            docker rm devops-api || true &&
            docker run -d -p 5000:5000 --name devops-api \
              -e APP_SECRET_KEY=${{ secrets.APP_SECRET_KEY }} \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-python-api:latest
          "
